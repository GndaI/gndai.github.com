<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">    
    <title>Sekai-Score Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --border: #333;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .lang-switcher {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .main-container {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1, h2 { margin-top: 0; color: var(--primary); }

        /* UI Elements */
        #song-search-input, select, input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #2a2a2a; border: 1px solid var(--border);
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .song-list-scroll {
            max-height: 350px; overflow-y: auto;
            border: 1px solid var(--border); border-radius: 8px; background: #181818;
        }

        .song-option {
            display: flex; align-items: center; padding: 10px;
            cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s;
        }

        .song-option:hover { background: #333; }
        .song-option img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; object-fit: cover; }

        .selected-song-display {
            display: flex; gap: 15px; background: #252525;
            padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: center;
        }

        #selected-jacket { width: 80px; height: 80px; border-radius: 8px; background: #444; }

        .input-group { display: flex; align-items: center; margin-bottom: 10px; }
        .input-group label { width: 100px; font-weight: bold; }

        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; margin: 2px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: #ff4d4d; color: white; }
        .btn-load { background: #444; color: white; }
        .btn-lang { background: #333; color: #ccc; border: 1px solid #444; }
        .btn-lang.active { border-color: var(--primary); color: var(--primary); }

        .result-box {
            background: #000; padding: 15px; border-radius: 10px;
            text-align: center; margin: 15px 0; border-left: 5px solid var(--primary);
        }

        #result-score { font-size: 24px; font-weight: bold; color: var(--primary); }
        #potential-val { font-size: 18px; color: var(--secondary); }

        .history-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; gap: 12px; }
        .history-item img { width: 45px; height: 45px; border-radius: 4px; }
        .history-info { flex-grow: 1; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .diff-EASY { color: #33ccff; }
        .diff-NORMAL { color: #22ee88; }
        .diff-HARD { color: #ffbb00; }
        .diff-EXPERT { color: #ff4466; }
        .diff-MASTER { color: #bb33ff; }
        .diff-APPEND { color: #ff77cc; }
        .lv-bold { font-weight: bold; }
        
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="btn-lang active" onclick="setLang('ko')">한국어</button>
    <button class="btn-lang" onclick="setLang('en')">English</button>
    <button class="btn-lang" onclick="setLang('ja')">日本語</button>
</div>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading Data...</div>
</div>

<div id="main-content" class="main-container">
    <div class="card">
        <h1 id="t-title">계산기</h1>
        
        <div class="song-picker-container">
            <label id="t-filter">난이도 필터</label>
            <select id="level-select"></select>
            <input type="text" id="song-search-input" placeholder="Search..." oninput="filterSongs()">
            <div id="song-list" class="song-list-scroll"></div>
        </div>

        <div class="selected-song-display" id="selected-song-ui" style="display:none;">
            <img id="selected-jacket" src="" alt="jacket">
            <div class="selected-info-text">
                <div id="selected-title" style="font-weight: bold;"></div>
                <div id="selected-diff" style="font-size: 0.8em; color: var(--primary);"></div>
            </div>
        </div>

        <div class="result-box">
            <div id="result-score">0</div>
            <div id="potential-val">Rating: 0.00</div>
        </div>

        <div id="input-fields">
            <div class="input-group"><label>Perfect</label><input type="number" id="perf" readonly=""></div>
            <div class="input-group"><label>Great</label><input type="number" id="great" value="0" oninput="calculate()"></div>
            <div class="input-group"><label>Good</label><input type="number" id="good" value="0" oninput="calculate()"></div>
            <div class="input-group"><label>Bad</label><input type="number" id="bad" value="0" oninput="calculate()"></div>
            <div class="input-group"><label>Miss</label><input type="number" id="miss" value="0" oninput="calculate()"></div>
        </div>

        <button class="btn-primary" style="width: 100%;" id="t-save" onclick="saveRecord()">결과 등록하기</button>
        <button class="btn-load" style="width: 100%;" id="t-reset" onclick="resetInputs()">초기화</button>
        <div id="top50-avg" style="margin-top: 15px; text-align: center; color: #888;">Top 50 Avg: 0.000</div>
    </div>

    <div class="card">
        <h2 id="t-history">등록된 기록</h2>
        <div style="margin-bottom:15px; display:flex; gap:5px;">
            <button class="btn-lang" id="t-export" onclick="exportData()">내보내기 (JSON)</button>
            <button class="btn-lang" id="t-import" onclick="document.getElementById('import-file').click()">가져오기</button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
        </div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    let allSongs = [];
    let userRecords = JSON.parse(localStorage.getItem('pjsekai_records')) || {};
    let currentSong = null;
    let currentLang = 'ko';

    // image_dd08b8.png에 있는 정보를 바탕으로 수정된 코드입니다.
    const supabaseUrl = 'https://qzblhynagyfilecdenwm.supabase.co'; // 화면 상단에 있는 주소
    const supabaseKey = '여기에 API Keys에서 복사한 anon 키를 넣으세요'; 

    //const supabase = exports.supabase.createClient(supabaseUrl, supabaseKey);

    const i18n = {
        ko: { title: "계산기", filter: "난이도 필터", save: "결과 등록하기", reset: "초기화", history: "등록된 기록", export: "내보내기", import: "가져오기", delete: "삭제", load: "불러오기", alertSave: "기록이 저장되었습니다.", alertTotal: "노트 수가 총합을 초과했습니다!", alertImport: "데이터를 성공적으로 가져왔습니다.", confirmDel: "삭제하시겠습니까?" },
        en: { title: "Calculator", filter: "Level Filter", save: "Save Record", reset: "Reset", history: "History", export: "Export", import: "Import", delete: "Del", load: "Load", alertSave: "Record saved!", alertTotal: "Notes exceed total count!", alertImport: "Import successful.", confirmDel: "Delete this record?" },
        ja: { title: "計算機", filter: "難易度フィルタ", save: "記録を保存", reset: "リセット", history: "登録済み記録", export: "書き出し", import: "読み込み", delete: "削除", load: "呼出", alertSave: "記録を保存しました。", alertTotal: "ノーツ数が合計を超えています！", alertImport: "インポートが完了しました。", confirmDel: "削除しますか？" }
    };

    const difficultyOrder = {
        'EASY': 1,
        'NORMAL': 2,
        'HARD': 3,
        'EXPERT': 4,
        'MASTER': 5,
        'APPEND': 6
    };

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        event?.target.classList.add('active');
        
        document.getElementById('t-title').innerText = i18n[lang].title;
        document.getElementById('t-filter').innerText = i18n[lang].filter;
        document.getElementById('t-save').innerText = i18n[lang].save;
        document.getElementById('t-reset').innerText = i18n[lang].reset;
        document.getElementById('t-history').innerText = i18n[lang].history;
        document.getElementById('t-export').innerText = i18n[lang].export;
        document.getElementById('t-import').innerText = i18n[lang].import;
        
        filterSongs();
        renderHistory();
    }

    function getJacketUrl(assetName) {
        return `./assets/jackets/${assetName}.webp`;
        
    }

    async function fetchSongData() {
        try {
            const [musicRes, diffRes] = await Promise.all([
                fetch('./assets/musics.json'),
                fetch('./assets/musicDifficulties.json')
            ]);
            const musics = await musicRes.json();
            const difficulties = await diffRes.json();

            allSongs = difficulties.map(diff => {
                const music = musics.find(m => m.id === diff.musicId);
                return {
                    id: `${diff.musicId}-${diff.musicDifficulty}`,
                    name: music ? music.title : 'Unknown',
                    level: diff.playLevel,
                    difficulty: diff.musicDifficulty.toUpperCase(),
                    totalNotes: diff.totalNoteCount,
                    jacket: music ? getJacketUrl(music.assetbundleName) : ''
                };
            });

            initApp();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
        } catch (e) {
            console.error(e);
        }
    }

    function initApp() {
        const lvSelect = document.getElementById('level-select');
        const levels = [...new Set(allSongs.map(s => s.level))].sort((a, b) => a - b);
        lvSelect.innerHTML = '<option value="all">All Levels</option>' + levels.map(lv => `<option value="${lv}">${lv}</option>`).join('');
        lvSelect.onchange = filterSongs;
        setLang('ko');
    }

    function filterSongs() {
        const lv = document.getElementById('level-select').value;
        const keyword = document.getElementById('song-search-input').value.toLowerCase();
        const listDiv = document.getElementById('song-list');
        
        // 1. 필터링
        let filtered = allSongs.filter(s => 
            (lv === 'all' || s.level == lv) && 
            s.name.toLowerCase().includes(keyword)
        );

        // 2. 난이도 순서로 정렬 (이지 -> 노말 -> 하드 -> 익스 -> 마스터 -> 어펜드)
        filtered.sort((a, b) => {
            return difficultyOrder[a.difficulty] - difficultyOrder[b.difficulty];
        });

        // 3. 화면 렌더링
        listDiv.innerHTML = filtered.map(s => `
            <div class="song-option" onclick="selectSong('${s.id}')">
                <img src="${s.jacket}" loading="lazy" onerror="this.src='https://placehold.co/50?text=?'">
                <div class="song-option-info">
                    <div style="font-weight:bold">${s.name}</div>
                    <span class="lv-bold diff-${s.difficulty}">Lv.${s.level}</span> | 
                    <span class="diff-${s.difficulty}">${s.difficulty}</span>
                </div>
            </div>
        `).join('');
    }

    function selectSong(id) {
        currentSong = allSongs.find(s => s.id === id);
        const ui = document.getElementById('selected-song-ui');
        const diffDisplay = document.getElementById('selected-diff');
        
        ui.style.display = 'flex';
        document.getElementById('selected-jacket').src = currentSong.jacket;
        document.getElementById('selected-title').innerText = currentSong.name;
        
        // 클래스를 초기화하고 새로 부여합니다
        diffDisplay.className = `diff-${currentSong.difficulty}`;
        diffDisplay.style.fontSize = "0.8em";
        diffDisplay.innerText = `Lv.${currentSong.level} ${currentSong.difficulty}`;
        
        resetInputs();
    }

    function resetInputs() {
        if (!currentSong) return;
        document.getElementById('perf').value = currentSong.totalNotes;
        ['great', 'good', 'bad', 'miss'].forEach(id => document.getElementById(id).value = 0);
        calculate();
    }

    function calculate() {
        if (!currentSong) return { score: 0, rating: 0 };

        let g = +document.getElementById('great').value;
        let gd = +document.getElementById('good').value;
        let b = +document.getElementById('bad').value;
        let m = +document.getElementById('miss').value;
        const total = currentSong.totalNotes;

        // --- 자동 보정 로직 시작 ---
        if (g + gd + b + m > total) {
            // 방금 수정한 필드가 무엇인지 찾아내어 최대치로 고정하기 위해
            // 현재 활성화된 input 요소를 확인합니다.
            const activeEl = document.activeElement;
            if (activeEl && activeEl.type === 'number') {
                const otherSums = (g + gd + b + m) - (+activeEl.value);
                activeEl.value = total - otherSums;
                
                // 보정된 값으로 변수 다시 할당
                g = +document.getElementById('great').value;
                gd = +document.getElementById('good').value;
                b = +document.getElementById('bad').value;
                m = +document.getElementById('miss').value;
            }
        }
        // --- 자동 보정 로직 끝 ---

        const p = total - (g + gd + b + m);
        document.getElementById('perf').value = p;

        // 점수 계산 (보정 후 p는 최소 0임이 보장됨)
        const score = Math.floor(((p + g/2 + gd/4 + b/8) / total) * 10000000);
        document.getElementById('result-score').innerText = score.toLocaleString();

        let rating = 0;
        const baseLevel = parseFloat(currentSong.level); 
        if (score >= 9800000) { 
            rating = baseLevel + (score - 9800000) / 100000; 
        } else { 
            rating = (baseLevel - 2) + (score - 9500000) / 150000; 
        }
        
        if (rating < 0) rating = 0;

        document.getElementById('potential-val').innerText = `Rating: ${rating.toFixed(2)}`;
        return { score, rating };
    }

    function saveRecord() {
        if (!currentSong) return;
        const { score, rating } = calculate();
        userRecords[currentSong.id] = {
            name: currentSong.name,
            diff: currentSong.difficulty,
            score: score,
            rating: rating.toFixed(2),
            details: { 
                great: +document.getElementById('great').value, 
                good: +document.getElementById('good').value, 
                bad: +document.getElementById('bad').value, 
                miss: +document.getElementById('miss').value 
            },
            date: new Date().toLocaleDateString()
        };
        
        localStorage.setItem('pjsekai_records', JSON.stringify(userRecords));
        renderHistory();
        alert(i18n[currentLang].alertSave);
    }

    function loadRecord(id) {
        const record = userRecords[id];
        if (!record) return;
        selectSong(id);
        if (record.details) {
            document.getElementById('great').value = record.details.great;
            document.getElementById('good').value = record.details.good;
            document.getElementById('bad').value = record.details.bad;
            document.getElementById('miss').value = record.details.miss;
        }
        calculate();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const records = Object.entries(userRecords)
            .map(([id, data]) => ({ id, ...data }))
            .sort((a, b) => b.rating - a.rating);
        
        list.innerHTML = records.map(r => {
            const songData = allSongs.find(s => s.id === r.id);
            const jacketUrl = songData ? songData.jacket : 'https://placehold.co/45?text=?';
            return `
                <div class="history-item">
                    <img src="${jacketUrl}" onerror="this.src='https://placehold.co/45?text=?'">
                    <div class="history-info">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <strong>${r.name}</strong>
                            <span style="font-size: 10px; color: #666;">${r.date || ''}</span>
                        </div>
                        <small class="diff-${r.diff}">[${r.diff}]</small><br>
                        <span>${parseInt(r.score).toLocaleString()}</span> | 
                        <span style="color:var(--secondary)">${r.rating}</span>
                    </div>
                    <div style="display:flex; gap:3px;">
                        <button class="btn-load" style="font-size:11px; padding:5px;" onclick="loadRecord('${r.id}')">${i18n[currentLang].load}</button>
                        <button class="btn-danger" style="font-size:11px; padding:5px;" onclick="deleteRecord('${r.id}')">${i18n[currentLang].delete}</button>
                    </div>
                </div>
            `;
        }).join('');
        const top50 = records.slice(0, 50);
        const avg = top50.reduce((acc, cur) => acc + parseFloat(cur.rating), 0) / (top50.length || 1);
        document.getElementById('top50-avg').innerText = `Top 50 Avg: ${avg.toFixed(3)}`;
    }

    function deleteRecord(id) {
        if (confirm(i18n[currentLang].confirmDel)) {
            delete userRecords[id];
            localStorage.setItem('pjsekai_records', JSON.stringify(userRecords));
            renderHistory();
        }
    }

    // Export / Import
    function exportData() {
        const dataStr = JSON.stringify(userRecords, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `sekai_records_${new Date().getTime()}.json`;
        link.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                userRecords = { ...userRecords, ...imported };
                localStorage.setItem('pjsekai_records', JSON.stringify(userRecords));
                renderHistory();
                alert(i18n[currentLang].alertImport);
            } catch (err) {
                alert("Error importing file.");
            }
        };
        reader.readAsText(file);
    }

    fetchSongData();
</script>

</body>
</html>
